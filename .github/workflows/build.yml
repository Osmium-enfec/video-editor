name: Build releases

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name VideoEditor --add-data "ffedit/config/presets.json;ffedit/config" ffedit/app.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: videoeditor-windows-exe
          path: dist/VideoEditor.exe

  build-macos-intel:
    name: Build macOS (Intel) DMG
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install build deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-build.txt
      - name: Build (Intel)
        run: |
          ./scripts/build_mac_arch.sh x86_64 --cython
      - name: Create DMG
        run: |
          ./scripts/create_dmg.sh dist/VideoEditor.app "VideoEditor" dist/VideoEditor-intel.dmg ""
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: videoeditor-macos-intel-dmg
          path: dist/VideoEditor-intel.dmg

  build-macos-silicon:
    name: Build macOS (Apple Silicon) DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install build deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-build.txt
      - name: Build (arm64)
        run: |
          ./scripts/build_mac_arch.sh arm64 --cython
      - name: Create DMG
        run: |
          ./scripts/create_dmg.sh dist/VideoEditor.app "VideoEditor" dist/VideoEditor-arm64.dmg ""
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: videoeditor-macos-arm64-dmg
          path: dist/VideoEditor-arm64.dmg
